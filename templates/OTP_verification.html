{% extends "base.html" %}
{% block title %} OTP-verification {% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <h2>OTP verification</h2>
        <form method="POST">
            <input type="text" name="otp" placeholder="Enter OTP" required>
            <button type="submit">Verify</button>
        </form>
    </div>
</div>

{% endblock %}
