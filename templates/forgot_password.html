{% extends "base.html" %}
{% block title %} forgot-password {% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <h2>Forgot Password</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send OTP</button>
        </form>
    </div>
</div>

{% endblock %}
